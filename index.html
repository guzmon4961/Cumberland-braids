    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Archivo Black', sans-serif; }
        
        .tropical-bg {
            background: linear-gradient(180deg, #b91c1c 0%, #450a0a 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* The "Flash" Pulse behind the form */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px rgba(253, 224, 71, 0.1); }
            50% { box-shadow: 0 0 60px rgba(253, 224, 71, 0.3); }
            100% { box-shadow: 0 0 20px rgba(253, 224, 71, 0.1); }
        }

        /* Button Light Sweep Flash */
        @keyframes sweep {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-blur: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: pulse-glow 4s infinite ease-in-out;
        }

        .flash-btn {
            position: relative;
            overflow: hidden;
        }

        .flash-btn::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg);
            animation: sweep 3s infinite;
        }

        .tropical-bg::before {
            content: "";
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgODAwIDYwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSIjMDAwIiBmaWxsLW9wYWNpdHk9IjAuMDgiPjxwYXRoIGQ9Ik03MCA2MDBjMC03MCA0MC0xMzAgMTAwLTE2MG0tMTAwIDE2MGMwLTkwIDYwLTE0MCAxMjAtMTYwbS0xMjAgMTYwYzAtMTEwIDgwLTE1MCAxNDAtMTYwIi8+PHBhdGggZD0iTTUwIDYwMGMwLTgwIDYwLTE1MCAxMjAtMTkwIi8+PC9nPjwvc3ZnPg==');
            background-size: cover;
            background-position: bottom;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
