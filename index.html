<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Did It By Lia | Elite Styling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Archivo Black', sans-serif; }
        
        /* High-End Textured Background (Looks like carbon/raw stone) */
        .elite-bg {
            background-color: #050505;
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            background-attachment: fixed;
        }

        /* Neon Glow for that Elite Vibe */
        .text-glow {
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.2), 0 0 40px rgba(234, 179, 8, 0.1);
        }

        .input-focus:focus {
            border-color: #eab308;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.3);
        }
    </style>
</head>
<body class="elite-bg text-stone-100 antialiased">

    <div class="bg-yellow-500 text-black py-2 text-center text-[11px] font-black uppercase tracking-tighter sticky top-0 z-[60]">
        ⚠️ DEPOSIT READY ONLY • NO EXCEPTIONS
    </div>

    <nav class="p-8 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5 sticky top-[32px] z-50">
        <h1 class="text-2xl tracking-tighter text-yellow-500">DIDITBY<span class="text-green-500">LIA</span></h1>
        <a href="https://www.tiktok.com/@diditbylia" target="_blank" class="text-[10px] bg-white/5 border border-white/10 px-4 py-2 rounded-full uppercase">TikTok</a>
    </nav>

    <section class="py-24 px-6 text-center">
        <div class="max-w-2xl mx-auto">
            <h2 class="text-6xl md:text-8xl leading-[0.85] tracking-tighter uppercase italic text-glow">
                PORTMORE<br>
                <span class="text-yellow-500">ELITE</span><br>
                <span class="text-green-600">STYLING.</span>
            </h2>
            <p class="mt-8 text-stone-500 text-xs uppercase tracking-[0.3em]">Braid Specialist • Appointments Only</p>
        </div>
    </section>

    <section class="px-6 pb-32">
        <div class="max-w-md mx-auto bg-black border-2 border-white/5 rounded-[40px] p-10 shadow-2xl relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-green-500/10 blur-[80px]"></div>
            
            <div class="relative z-10">
                <p class="text-[10px] text-green-500 mb-8 tracking-widest uppercase italic">// SECURE INTAKE GATE</p>
                
                <form class="space-y-6">
                    <div>
                        <input type="text" required placeholder="FULL NAME" class="w-full bg-stone-900/50 border border-stone-800 rounded-2xl py-5 px-6 text-sm uppercase placeholder:text-stone-700 outline-none input-focus transition-all">
                    </div>
                    <div>
                        <input type="text" required placeholder="DESIRED STYLE" class="w-full bg-stone-900/50 border border-stone-800 rounded-2xl py-5 px-6 text-sm uppercase placeholder:text-stone-700 outline-none input-focus transition-all">
                    </div>

                    <div class="bg-stone-900/30 p-5 rounded-2xl border border-stone-800 flex items-center justify-between">
                        <label class="flex items-center gap-4 cursor-pointer">
                            <input type="checkbox" required class="w-6 h-6 rounded-lg bg-black border-stone-700 checked:bg-yellow-500 transition-all">
                            <span class="text-[10px] font-bold uppercase italic text-stone-400">I am deposit ready</span>
                        </label>
                        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" class="h-5 opacity-20 grayscale">
                    </div>

                    <a href="https://wa.me/18762943532" class="block w-full bg-stone-100 hover:bg-yellow-500 text-black text-center py-6 rounded-2xl font-black text-base uppercase tracking-tighter transition-all active:scale-95 shadow-xl">
                        CONFIRM & BOOK
                    </a>
                </form>
                
                <p class="mt-6 text-[9px] text-stone-600 text-center uppercase tracking-widest leading-relaxed">
                    Verified Clients Only<br>
                    (876) 294-3532
                </p>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center bg-black border-t border-white/5">
        <p class="text-stone-800 text-[9px] tracking-[0.5em] font-black uppercase italic">© 2026 THE STREETS ARE HUNGRY LLC</p>
    </footer>

</body>
</html>
